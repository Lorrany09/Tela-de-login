<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" href="img/sol.png" type="image/png">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <main>
        <div class="blocoCentral">
            <div class="telaDeLogin">
                <div class="conteudo">
                    <div class="titulo">
                        <h1>LOGIN</h1>
                    </div>
                    <hr>
                    <div class="email">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Ex: Eu@gmail.com">
                    </div>
                    <div class="senha">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="Sua senha">
                    </div>
                    <div class="terceiros">
                        <div class="lembreSenha">
                            <label class="container">
                                <input type="checkbox">
                                <span class="checkmark"></span>
                            </label>   
                            <p>Lembre de mim</p>
                        </div>
                        <div class="link">
                            <a href="javascript:void(0)"><p>Esqueceu a senha?</p></a>
                        </div>
                    </div>
                    <div class="botao">
                        <button type="button">Entrar</button>
                    </div>
                    <div class="criarConta">
                        <p>Não tem conta ainda? <a href="cadastro.html">Crie agora.</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
