<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <main>
        <div class="blocoCentral">
            <div class="telaDeLogin">
                <div class="conteudo">
                    <div class="titulo">
                        <h1>LOGIN</h1>
                    </div>
                    <hr>
                    <div class="email">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Ex: Eu@gmail.com">
                    </div>
                    <div class="senha">
                        <label for="senha">Senha</label>
                        <input type="passaword" id="senha" placeholder="Sua senha">
                    </div>
                    <div class="terceiros">
                        <div class="lembreSenha">
                            <input type="checkbox" id="opcao1">
                            <label for="opcao1">Lembre de mim</label>
                        </div>
                        <div class="link">
                            <a href="#"><label>Esqueceu a senha?</label></a>
                        </div>
                    </div>
                    <div class="botao">
                        <button>Entrar</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
