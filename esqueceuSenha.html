<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueceu a senha?</title>
    <link rel="icon" href="img/sol.png" type="image/png">
    <link rel="stylesheet" href="esqueceuSenha.css">
</head>
<body>
    <header>
        <a href="index.html"><button type="button" class="voltar">Voltar</button></a>
    </header>
    <main>
        <div class="container">
            <div class="titulo">
                <h1>Recuperação de senha</h1>
            </div>
            <hr>
            <p>Enviaremos um email para redefinir a sua senha.</p>
            <div class="email">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Ex: Eu@gmail.com">
            </div>
            <div class="botao">
                <button type="button">Enviar</button>
            </div>
        </div>
    </main>
</body>
</html>
