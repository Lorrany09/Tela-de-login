<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro do usuario</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <header>
        <a href="index.html"><button>Voltar</button></a>
    </header>
    <main>
        <div class="blocoCadastro">
            <div class="conteudo">
                <div class="titulo">
                    <h1>Cadastro</h1>
                </div>
                <hr>
                <div class="conjunto">
                    <div class="primeiro">
                        <div class="input">
                            <label for="nome">Nome completo</label>
                            <input type="text" id="nome" placeholder="Ex: Icaro Lamartine">
                        </div>
                        <div class="input">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="Ex: Eu@gmail.com">
                        </div>
                        <div class="input">
                            <label for="senha">Senha</label>
                            <input type="passaword" id="senha" placeholder="Sua senha">
                        </div>
                    </div>
                    <div class="segundo">
                        <div class="input">
                            <label for="genero">Gênero</label>
                            <select>
                                <option value="">Mulher cis</option>
                                <option value="">Homem cis</option>
                                <option value="">Mulher trans</option>
                                <option value="">Homem trans</option>
                                <option value="">Não binario</option>
                                <option value="">Outro</option>
                            </select>
                        </div>
                        <div class="input">
                            <label for="data">Data de nascimento</label>
                            <input type="date" id="data">
                        </div>
                        <div class="input">
                            <label for="senha">Confirme sua senha</label>
                            <input type="passaword" id="senha" placeholder="Digite sua senha de novo">
                        </div>
                    </div>
                </div>
                <div class="botao">
                    <a href="#"><button>Enviar</button></a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
