<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro do usuario</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <header>
        <a href="index.html"><button>Voltar</button></a>
    </header>
    <main>
        <div class="blocoCadastro">
            <div class="conteudo">
                <div class="titulo">
                    <h1>Cadastro</h1>
                </div>
                <hr>
                <div class="input">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" placeholder="Ex: Icaro Lamartine">
                </div>
                <div class="input">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Ex: Eu@gmail.com">
                </div>
                <div class="input">
                    <label for="senha">Senha</label>
                    <input type="passaword" id="senha" placeholder="Sua senha">
                </div>
                <div class="input">
                    <label for="senha">Confirme sua senha</label>
                    <input type="passaword" id="senha" placeholder="Digite sua senha de novo">
                </div>
                <div class="botao">
                    <a href="#"><button>Enviar</button></a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
