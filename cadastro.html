<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro do usuario</title>
    <link rel="icon" href="img/sol.png" type="image/png">
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <header>
        <a href="index.html"><button type="button">Voltar</button></a>
    </header>
    <main>
        <div id="container">
            <h1>Cadastro</h1>
            <hr>
            <div id="aviso"></div>
            <div class="conjunto">
                <div class="primeiro">
                    <div class="input">
                        <label for="nome">Nome completo</label>
                        <input type="text" id="nome" placeholder="Ex: Icaro Lamartine">
                    </div>
                    <div class="input">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Ex: Eu@gmail.com">
                   </div>
                    <div class="input">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="Sua senha">
                    </div>
                </div>
                <div class="segundo">
                    <div class="input">
                        <label for="genero">Gênero</label>
                        <select id="genero">
                            <option value="" hidden disabled selected></option>
                        </select>
                    </div>
                    <div class="input">
                        <label for="data">Data de nascimento</label>
                        <input type="date" id="data">
                    </div>
                    <div class="input">
                        <label for="senhaConf">Confirme sua senha</label>
                        <input type="password" id="confirmeSenha" placeholder="Digite sua senha de novo">
                    </div>
                </div>
            </div>
            <div class="botao">
                <button type="button" onclick="avisar()">Enviar</button>
            </div>
        </div>
    </main>
    <script src="confirmacaoDeDados.js"></script>
</body>
</html>
